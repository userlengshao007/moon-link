spring:
  application:
    name: moon-im-server
  kafka:
    bootstrap-servers: ${MOON_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: moon-im-server
      auto-offset-reset: latest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MOON_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/moon-im?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MOON_MYSQL_USERNAME:root}
    password: ${MOON_MYSQL_PASSWORD:wsnbb1234}
  redis:
    host: ${MOON_REDIS_HOST:127.0.0.1}
    port: ${MOON_REDIS_PORT:6379}
    password: ${MOON_REDIS_PASSWORD:}
    database: ${MOON_REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

moon-im:
  kafka:
    private-chat-topic: private_chat
    user-online-topic: user_online
    user-online-group-id: moon-im-user-online

moon-link:
  grpc:
    host: ${MOON_LINK_GRPC_HOST:127.0.0.1}
    port: ${MOON_LINK_GRPC_PORT:10000}
